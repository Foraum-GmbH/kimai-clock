name: Build, Sign, Notarize and Release macOS App

permissions:
  contents: write

on:
  push:
    tags:
      - '*'

env:
  APP_NAME: "KimaiClock"
  XCODE_PROJECT: "KimaiClock.xcodeproj"
  SCHEME: "KimaiClock"
  CONFIGURATION: "Release"
  APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
  APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
  APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

jobs:
  build-and-release:
    runs-on: macos-26
    concurrency:
      group: release
      cancel-in-progress: false
    
    steps:
    - name: Validate tag
      run: |
        TAG_NAME="${GITHUB_REF#refs/tags/}"

        delete_tag() {
          echo "Deleting invalid tag '$TAG_NAME' from remote..."
          gh api "repos/Foraum-GmbH/kimai-clock/git/refs/tags/$TAG_NAME" --method DELETE
        }

        # Require v prefix for consistent tag formatting
        if ! [[ "$TAG_NAME" == v* ]]; then
          echo "Error: tag must start with 'v' (e.g. v1.2.3), got '$TAG_NAME'"
          delete_tag
          exit 1
        fi

        VERSION="${TAG_NAME#v}"

        # Validate semver format (X.Y.Z digits only)
        if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Error: '$TAG_NAME' is not valid semver (expected vX.Y.Z)"
          delete_tag
          exit 1
        fi

        # Ensure new version is strictly greater than the current latest release
        LATEST=$(gh release view --repo Foraum-GmbH/kimai-clock --json tagName --jq .tagName 2>/dev/null | sed 's/^v//' || echo "0.0.0")
        echo "Current latest release: $LATEST — new version: $VERSION"
        if ! python3 -c "a=tuple(int(x) for x in '$LATEST'.split('.'));b=tuple(int(x) for x in '$VERSION'.split('.'));exit(0 if b>a else 1)"; then
          echo "Error: version $VERSION is not greater than current latest $LATEST"
          delete_tag
          exit 1
        fi
      env:
        GH_TOKEN: ${{ secrets.GH_PAT }}

    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Scan for secrets
      uses: trufflesecurity/trufflehog@v3.94.2
      with:
        path: ./
        only-verified: true

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1.7.0
      with:
        xcode-version: latest-stable
        
    - name: Install create-dmg
      run: brew install create-dmg
      
    - name: Import Code-Signing Certificates
      uses: Apple-Actions/import-codesign-certs@v6.1.0
      with:
        p12-file-base64: ${{ secrets.CERTIFICATES_P12 }}
        p12-password: ${{ secrets.CERTIFICATES_P12_PASSWORD }}

    - name: Install Provisioning Profiles
      run: |
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

        echo "${{ secrets.PROVISIONING_PROFILE_APP }}" | base64 --decode > /tmp/app.provisionprofile
        echo "${{ secrets.PROVISIONING_PROFILE_WIDGET }}" | base64 --decode > /tmp/widget.provisionprofile

        APP_UUID=$(security cms -D -i /tmp/app.provisionprofile | plutil -extract UUID raw -)
        WIDGET_UUID=$(security cms -D -i /tmp/widget.provisionprofile | plutil -extract UUID raw -)

        cp /tmp/app.provisionprofile ~/Library/MobileDevice/Provisioning\ Profiles/$APP_UUID.provisionprofile
        cp /tmp/widget.provisionprofile ~/Library/MobileDevice/Provisioning\ Profiles/$WIDGET_UUID.provisionprofile

        echo "APP_PROFILE_UUID=$APP_UUID" >> $GITHUB_ENV
        echo "WIDGET_PROFILE_UUID=$WIDGET_UUID" >> $GITHUB_ENV

    - name: Decode Apple API Key
      run: |
        echo "Decoding APPLE_API_KEY..."
        if ! echo "$APPLE_API_KEY" | base64 --decode > AuthKey.p8; then
          echo "Error: Failed to decode base64 APPLE_API_KEY"
          exit 1
        fi
        if [ ! -s "AuthKey.p8" ]; then
          echo "Error: AuthKey.p8 is empty"
          exit 1
        fi
        echo "AuthKey.p8 created successfully ($(wc -c < AuthKey.p8) bytes)"

    - name: Build App
      run: |
        xcodebuild \
          -project "$XCODE_PROJECT" \
          -scheme "$SCHEME" \
          -configuration "$CONFIGURATION" \
          -archivePath "$APP_NAME.xcarchive" \
          -destination "generic/platform=macOS" \
          -allowProvisioningUpdates \
          -authenticationKeyPath "$GITHUB_WORKSPACE/AuthKey.p8" \
          -authenticationKeyID "$APPLE_API_KEY_ID" \
          -authenticationKeyIssuerID "$APPLE_API_ISSUER" \
          archive
          
    - name: Export App
      run: |
        # Create ExportOptions.plist with manual signing using installed profiles
        cat > ExportOptions.plist << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>destination</key>
            <string>export</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Developer ID Application</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>provisioningProfiles</key>
            <dict>
                <key>de.foraum.KimaiClock</key>
                <string>$APP_PROFILE_UUID</string>
                <key>de.foraum.KimaiClock.KimaiWidget</key>
                <string>$WIDGET_PROFILE_UUID</string>
            </dict>
        </dict>
        </plist>
        EOF

        # Export the archive
        xcodebuild \
          -archivePath "$APP_NAME.xcarchive" \
          -exportArchive \
          -exportPath export \
          -exportOptionsPlist ExportOptions.plist

    - name: Create DMG
      run: |
        # Find the actual .app file
        APP_FILE=$(find export/ -name "*.app" -type d | head -1)
        if [ -z "$APP_FILE" ]; then
          echo "Error: No .app file found in export directory"
          exit 1
        fi
        
        echo "Using app file: $APP_FILE"
        APP_NAME_ACTUAL=$(basename "$APP_FILE" .app)
        echo "Actual app name: $APP_NAME_ACTUAL"
        
        # Create a DMG file
        create-dmg \
          --volname "$APP_NAME_ACTUAL" \
          --background "$GITHUB_WORKSPACE/assets/background.tiff" \
          --volicon "$GITHUB_WORKSPACE/assets/volicon.icns" \
          --window-size 600 400 \
          --icon-size 128 \
          --icon "$APP_NAME_ACTUAL.app" 150 150 \
          --hide-extension "$APP_NAME_ACTUAL.app" \
          --app-drop-link 450 150 \
          "$APP_NAME_ACTUAL.dmg" \
          "export/" \
        || echo "Warning: create-dmg completed with warnings (this is often normal)"

    - name: Sign DMG
      run: |
        # Sign the DMG
        codesign --force --sign "${{ secrets.DEVELOPER_ID_APPLICATION }}" "$APP_NAME.dmg"
        
        # Verify signing
        codesign --verify --verbose "$APP_NAME.dmg"

    - name: Notarize DMG
      run: |
        # Submit DMG for notarization
        xcrun notarytool submit "$APP_NAME.dmg" \
          --key AuthKey.p8 \
          --key-id "${{ secrets.APPLE_API_KEY_ID }}" \
          --issuer "${{ secrets.APPLE_API_ISSUER }}" \
          --timeout 30m \
          --wait
          
        # Staple the notarization to DMG
        xcrun stapler staple "$APP_NAME.dmg"

    - name: Verify Notarization
      run: |
        # Verify the notarization was successful
        spctl --assess --type open --context context:primary-signature "$APP_NAME.dmg"

    - name: Compute DMG SHA256
      id: dmg_info
      run: |
        SHA256=$(shasum -a 256 "$APP_NAME.dmg" | awk '{print $1}')
        echo "sha256=$SHA256" >> $GITHUB_OUTPUT
        echo "SHA256: $SHA256"

    - name: Get release info
      id: release_info
      run: |
        VERSION="${GITHUB_REF#refs/tags/}"
        VERSION="${VERSION#v}"
        echo "tag_name=v$VERSION" >> $GITHUB_OUTPUT
        echo "release_name=v$VERSION" >> $GITHUB_OUTPUT
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        
    - name: Create Release
      uses: softprops/action-gh-release@v2.6.1
      with:
        tag_name: ${{ steps.release_info.outputs.tag_name }}
        name: ${{ steps.release_info.outputs.release_name }}
        draft: false
        prerelease: false
        files: |
          ${{ env.APP_NAME }}.dmg
        body: |
          ## Installation

          1. Download the DMG file
          2. Double-click to mount the disk image
          3. Drag the app to your Applications folder

          **Note**: This app is signed and notarized by Apple.
      env:
        GITHUB_TOKEN: ${{ secrets.GH_PAT }}

    - name: Update Homebrew cask in homebrew-foraum
      run: |
        VERSION="${{ steps.release_info.outputs.version }}"
        SHA256="${{ steps.dmg_info.outputs.sha256 }}"

        CASK_CONTENT=$(printf 'cask "kimai-clock" do\n  version "%s"\n  sha256 "%s"\n  url "https://github.com/Foraum-GmbH/kimai-clock/releases/download/v#{version}/KimaiClock.dmg"\n  name "KimaiClock"\n  desc "Track and manage Kimai 2 time entries from the menu bar"\n  homepage "https://github.com/Foraum-GmbH/kimai-clock"\n  app "KimaiClock.app"\nend\n' "$VERSION" "$SHA256")
        CURRENT_SHA=$(gh api repos/Foraum-GmbH/homebrew-foraum/contents/Casks/kimai-clock.rb --jq .sha)

        gh api repos/Foraum-GmbH/homebrew-foraum/contents/Casks/kimai-clock.rb \
          --method PUT \
          -f message="chore: bump kimai-clock to $VERSION" \
          -f content="$(echo "$CASK_CONTENT" | base64 | tr -d '\n')" \
          -f sha="$CURRENT_SHA"
      env:
        GH_TOKEN: ${{ secrets.GH_PAT }}

    - name: Clean up local Secrets
      if: always()
      run: rm -f AuthKey.p8

    - name: Rollback release on failure
      if: failure()
      run: |
        VERSION="${{ steps.release_info.outputs.version }}"
        if [ -z "$VERSION" ]; then
          echo "Version not set, nothing to roll back."
          exit 0
        fi
        echo "Rolling back release v$VERSION..."
        gh release delete "v$VERSION" --repo Foraum-GmbH/kimai-clock --yes 2>/dev/null && echo "Release deleted." || echo "Release not found, skipping."
        gh api "repos/Foraum-GmbH/kimai-clock/git/refs/tags/v$VERSION" --method DELETE 2>/dev/null && echo "Tag deleted." || echo "Tag not found, skipping."
      env:
        GH_TOKEN: ${{ secrets.GH_PAT }}

    - name: Job summary
      if: always()
      run: |
        VERSION="${{ steps.release_info.outputs.version }}"
        SHA256="${{ steps.dmg_info.outputs.sha256 }}"
        if [ -n "$VERSION" ]; then
          RELEASE_URL="https://github.com/Foraum-GmbH/kimai-clock/releases/tag/v$VERSION"
          printf '## Release summary\n\n| | |\n|---|---|\n| **Version** | `v%s` |\n| **SHA256** | `%s` |\n| **Release** | %s |\n' \
            "$VERSION" "$SHA256" "$RELEASE_URL" >> $GITHUB_STEP_SUMMARY
        else
          echo "## Release failed — no version was produced." >> $GITHUB_STEP_SUMMARY
        fi

    - name: Notify kimai/kimai of new release
      if: false
      run: |
        VERSION="${{ steps.release_info.outputs.version }}"
        RELEASE_URL="https://github.com/Foraum-GmbH/kimai-clock/releases/tag/v$VERSION"
        BODY=$(printf '## KimaiClock %s is available\n\nKimaiClock (https://github.com/Foraum-GmbH/kimai-clock) — a macOS menu bar app for tracking Kimai time entries — has been updated to **%s**.\n\n- **Release:** %s\n\nPlease update the listing in your marketplace/addon directory if applicable.' "$VERSION" "$VERSION" "$RELEASE_URL")
        gh issue create \
          --repo kimai/kimai \
          --title "KimaiClock $VERSION released" \
          --body "$BODY"
      env:
        GH_TOKEN: ${{ secrets.GH_PAT }}